kind = "mobile"
previewPath = "/"
title = "Folvio"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/"
localPort = 18115
name = "expo"
paths = ["/"]

[services.development]
run = "fuser -k 8081/tcp 2>/dev/null || true; fuser -k 18115/tcp 2>/dev/null || true; pnpm --filter @workspace/mobile run dev"

[services.env]
PORT = "18115"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/mobile", "run", "serve"]
